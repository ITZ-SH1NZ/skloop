<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="turbulence">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A3E635"/>
      <stop offset="35%" stop-color="#38BDF8"/>
      <stop offset="65%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#fafafa"/>
  <rect width="400" height="200" fill="url(#ng)" opacity="0.35" filter="url(#turbulence)"/>
  <!-- scattered micro-shapes for organic feel -->
  <circle cx="80" cy="60" r="30" fill="#A3E635" opacity="0.12"/>
  <circle cx="200" cy="100" r="50" fill="#38BDF8" opacity="0.1"/>
  <circle cx="320" cy="50" r="35" fill="#A78BFA" opacity="0.12"/>
  <circle cx="150" cy="160" r="40" fill="#FB7185" opacity="0.1"/>
  <circle cx="340" cy="150" r="28" fill="#FCD34D" opacity="0.12"/>
</svg>
