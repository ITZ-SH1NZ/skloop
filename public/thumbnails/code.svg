<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="200" fill="#f7fee7"/>
  <!-- faint code lines -->
  <g font-family="monospace" font-size="12" fill="#4d7c0f" opacity="0.3">
    <text x="20" y="25">&lt;!DOCTYPE html&gt;</text>
    <text x="20" y="43">&lt;html lang="en"&gt;</text>
    <text x="20" y="61">  &lt;head&gt;</text>
    <text x="20" y="79">    &lt;title&gt;My App&lt;/title&gt;</text>
    <text x="20" y="97">  &lt;/head&gt;</text>
    <text x="20" y="115">  &lt;body&gt;</text>
    <text x="20" y="133">    &lt;h1&gt;Hello World&lt;/h1&gt;</text>
    <text x="20" y="151">    &lt;p&gt;Start coding...&lt;/p&gt;</text>
    <text x="20" y="169">  &lt;/body&gt;</text>
    <text x="20" y="187">&lt;/html&gt;</text>
  </g>
  <!-- lime accent overlay -->
  <rect width="6" height="200" fill="#A3E635" opacity="0.6"/>
  <!-- line numbers -->
  <g font-family="monospace" font-size="11" fill="#A3E635" opacity="0.5">
    <text x="10" y="25">1</text>
    <text x="10" y="43">2</text>
    <text x="10" y="61">3</text>
    <text x="10" y="79">4</text>
    <text x="10" y="97">5</text>
    <text x="10" y="115">6</text>
    <text x="10" y="133">7</text>
    <text x="10" y="151">8</text>
    <text x="10" y="169">9</text>
    <text x="10" y="187">10</text>
  </g>
</svg>
