<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="200" fill="#f8fafc"/>
  <!-- vertical lines -->
  <g stroke="#94A3B8" stroke-width="0.8" opacity="0.35">
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/>
    <line x1="280" y1="0" x2="280" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/>
  </g>
  <!-- horizontal lines -->
  <g stroke="#94A3B8" stroke-width="0.8" opacity="0.35">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
  </g>
  <!-- accent crosses at intersections -->
  <g stroke="#475569" stroke-width="1.5" opacity="0.25">
    <line x1="196" y1="78" x2="204" y2="82"/>
    <line x1="196" y1="82" x2="204" y2="78"/>
    <line x1="116" y1="118" x2="124" y2="122"/>
    <line x1="116" y1="122" x2="124" y2="118"/>
    <line x1="276" y1="38" x2="284" y2="42"/>
    <line x1="276" y1="42" x2="284" y2="38"/>
    <line x1="356" y1="158" x2="364" y2="162"/>
    <line x1="356" y1="162" x2="364" y2="158"/>
  </g>
  <!-- bold border grid -->
  <g stroke="#94A3B8" stroke-width="2" opacity="0.5">
    <line x1="0" y1="0" x2="400" y2="0"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="0" x2="0" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
  </g>
</svg>
