<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="200" fill="#f0fdfa"/>
  <!-- traces -->
  <g stroke="#2DD4BF" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="20,40 80,40 80,100 160,100"/>
    <polyline points="160,100 160,60 240,60 240,140 320,140"/>
    <polyline points="320,140 320,80 380,80"/>
    <polyline points="40,160 100,160 100,120 180,120 180,180 260,180"/>
    <polyline points="260,180 260,100 340,100 340,160 400,160"/>
    <polyline points="0,100 60,100 60,140 140,140 140,60 220,60"/>
    <polyline points="220,60 220,20 300,20 300,80 380,80"/>
  </g>
  <!-- nodes -->
  <g fill="#2DD4BF" opacity="0.85">
    <circle cx="80" cy="40" r="4"/>
    <circle cx="80" cy="100" r="4"/>
    <circle cx="160" cy="100" r="4"/>
    <circle cx="160" cy="60" r="4"/>
    <circle cx="240" cy="60" r="4"/>
    <circle cx="240" cy="140" r="4"/>
    <circle cx="320" cy="140" r="4"/>
    <circle cx="320" cy="80" r="4"/>
    <circle cx="100" cy="160" r="4"/>
    <circle cx="100" cy="120" r="4"/>
    <circle cx="180" cy="120" r="4"/>
    <circle cx="260" cy="180" r="4"/>
    <circle cx="260" cy="100" r="4"/>
    <circle cx="340" cy="100" r="4"/>
  </g>
  <!-- chips -->
  <rect x="130" y="50" width="30" height="20" rx="3" fill="#0d9488" opacity="0.7"/>
  <rect x="290" y="70" width="30" height="20" rx="3" fill="#0d9488" opacity="0.7"/>
  <rect x="50" y="130" width="30" height="20" rx="3" fill="#0d9488" opacity="0.7"/>
</svg>
